<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARGUS — Access Blocked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:         #070b14;
      --card:       #0d1526;
      --border:     #1e2d4a;
      --red:        #ef4444;
      --amber:      #f59e0b;
      --green:      #00ff88;
      --text:       #e8f0fe;
      --muted:      #5a7298;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(239,68,68,0.35);
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 0 40px rgba(239,68,68,0.12), 0 8px 32px rgba(0,0,0,0.7);
      text-align: center;
    }
    .shield-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: rgba(239,68,68,0.1);
      border: 2px solid rgba(239,68,68,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px rgba(239,68,68,0.2); }
      50%      { box-shadow: 0 0 24px rgba(239,68,68,0.5); }
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 0.1em;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--red);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .url-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      text-align: left;
    }
    .url-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .url-value {
      font-size: 12px;
      font-family: 'Consolas', monospace;
      color: var(--red);
      word-break: break-all;
      line-height: 1.5;
    }
    .reason-box {
      background: rgba(239,68,68,0.05);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .reason-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .reason-value {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }
    .score-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .score-label { font-size: 12px; color: var(--muted); }
    .score-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      max-width: 160px;
    }
    .score-fill {
      height: 100%;
      background: var(--red);
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .score-num {
      font-size: 14px;
      font-weight: 800;
      color: var(--red);
    }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .btn-back {
      padding: 12px 28px;
      background: var(--green);
      color: #070b14;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
    }
    .btn-back:hover { opacity: 0.85; }
    .btn-proceed {
      padding: 12px 20px;
      background: rgba(239,68,68,0.1);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }
    .btn-proceed:hover { background: rgba(239,68,68,0.18); }
    .argus-footer {
      margin-top: 24px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .argus-footer span { color: var(--green); font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.36C17.25 22.15 21 17.25 21 12V7L12 2z"
              fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="2"/>
        <line x1="12" y1="8" x2="12" y2="12" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="12" cy="15.5" r="1.2" fill="#ef4444"/>
      </svg>
    </div>

    <div class="badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="10"/>
      </svg>
      ARGUS THREAT BLOCKED
    </div>

    <h1>Dangerous Website Blocked</h1>
    <p class="sub">ARGUS has prevented you from visiting this page.<br>Our AI analysis flagged this URL as malicious or a phishing site.</p>

    <div class="url-box">
      <div class="url-label">BLOCKED URL</div>
      <div class="url-value" id="blockedUrl">Loading...</div>
    </div>

    <div class="reason-box">
      <div class="reason-label">THREAT REASON</div>
      <div class="reason-value" id="threatReason">Analyzing...</div>
    </div>

    <div class="score-row">
      <span class="score-label">Risk Score</span>
      <div class="score-bar"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>
      <span class="score-num" id="scoreNum">0</span>
    </div>

    <div class="actions">
      <button class="btn-back" onclick="goBack()">← Go Back (Safe)</button>
      <button class="btn-proceed" onclick="proceedAnyway()" id="proceedBtn">Proceed anyway (risky)</button>
    </div>

    <div class="argus-footer"><span>ARGUS</span> — Adaptive Risk & Generative Understanding System v2.0</div>
  </div>

  <script>
    const params     = new URLSearchParams(window.location.search);
    const blockedUrl = params.get('url') || '';
    const reason     = params.get('reason') || 'Malicious URL detected by ARGUS AI analysis';
    const parsedScore = Number.parseInt(params.get('score') || '85', 10);
    const score = Number.isFinite(parsedScore) ? Math.max(0, Math.min(parsedScore, 100)) : 85;

    // URLSearchParams already decodes values, so avoid decodeURIComponent again.
    document.getElementById('blockedUrl').textContent   = blockedUrl || '(unknown)';
    document.getElementById('threatReason').textContent = reason;
    document.getElementById('scoreNum').textContent     = String(score);
    setTimeout(() => {
      document.getElementById('scoreFill').style.width = score + '%';
    }, 100);

    function goBack() {
      if (window.history.length > 1) {
        window.history.go(-2); // -2 to skip the blocked page
      } else {
        window.close();
      }
    }

    function proceedAnyway() {
      if (!blockedUrl) return;
      const shouldProceed = window.confirm(
        'WARNING: You are about to visit a site flagged as MALICIOUS by ARGUS.\n\n' +
        'This site may steal your credentials, infect your device with malware, or perform phishing attacks.\n\n' +
        'Are you absolutely sure you want to proceed?'
      );
      if (shouldProceed) {
        window.location.href = blockedUrl;
      }
    }

    // Auto-hide proceed button after 5s to discourage click
    setTimeout(() => {
      const btn = document.getElementById('proceedBtn');
      if (btn) btn.style.opacity = '0.4';
    }, 5000);
  </script>
</body>
</html>
