<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARGUS — Analyzing URL...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* ═══════════════════════════════════════════════════════════
       CUSTOM SCROLLBAR STYLING (matches extension theme)
       ══════════════════════════════════════════════════════════ */
    
    /* Scrollbar for all elements */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    
    /* Webkit browsers (Chrome, Edge, Safari) */
    *::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    *::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 10px;
    }
    
    *::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 10px;
      transition: background 0.2s ease;
    }
    
    *::-webkit-scrollbar-thumb:hover {
      background: color-mix(in srgb, var(--green) 40%, var(--border));
    }
    
    *::-webkit-scrollbar-thumb:active {
      background: color-mix(in srgb, var(--green) 60%, var(--border));
    }
    
    :root {
      --bg:         #070b14;
      --card:       #0d1526;
      --border:     #1e2d4a;
      --green:      #00ff88;
      --text:       #e8f0fe;
      --muted:      #5a7298;
    }
    :root[data-theme="light"] {
      --bg:         #f3f7ff;
      --card:       #ffffff;
      --border:     #d4e1f7;
      --green:      #0ca678;
      --text:       #0b1a33;
      --muted:      #526a90;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background 0.3s ease, color 0.3s ease;
    }
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
      transition: all 0.3s ease;
    }
    .shield-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: rgba(0,255,136,0.1);
      border: 2px solid rgba(0,255,136,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
      transition: all 0.3s ease;
    }
    :root[data-theme="light"] .shield-icon {
      background: rgba(12,166,120,0.1);
      border-color: rgba(12,166,120,0.3);
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 8px rgba(0,255,136,0.2); }
      50%      { box-shadow: 0 0 24px rgba(0,255,136,0.5); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(0,255,136,0.2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,255,136,0.12);
      border: 1.5px solid rgba(0,255,136,0.3);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }
    :root[data-theme="light"] .badge {
      background: rgba(12,166,120,0.12);
      border-color: rgba(12,166,120,0.3);
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }
    .sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .url-box {
      background: rgba(0,0,0,0.4);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 24px;
      text-align: left;
      transition: all 0.3s ease;
    }
    :root[data-theme="light"] .url-box {
      background: rgba(0,0,0,0.03);
    }
    .url-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .url-value {
      font-size: 12px;
      font-family: 'Consolas', monospace;
      color: var(--green);
      word-break: break-all;
      line-height: 1.5;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
      width: 0%;
      animation: progress 3s ease-in-out forwards;
    }
    @keyframes progress {
      0%   { width: 0%; }
      50%  { width: 60%; }
      100% { width: 90%; }
    }
    .status-text {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .argus-footer {
      margin-top: 24px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .argus-footer span { color: var(--green); font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="shield-icon">
      <div class="spinner"></div>
    </div>

    <div class="badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
        <circle cx="12" cy="12" r="10"/>
      </svg>
      ARGUS SECURITY CHECK
    </div>

    <h1>Analyzing URL Safety</h1>
    <p class="sub">ARGUS is scanning this website for threats.<br>This will only take a moment...</p>

    <div class="url-box">
      <div class="url-label">CHECKING URL</div>
      <div class="url-value" id="targetUrl">Loading...</div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>

    <div class="status-text" id="statusText">Running AI threat analysis...</div>

    <div class="argus-footer"><span>ARGUS</span> — Adaptive Risk & Generative Understanding System v2.0</div>
  </div>

  <script src="analyzing-script.js"></script>
</body>
</html>
